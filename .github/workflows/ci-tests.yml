name: CI - Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install linting tools
        run: |
          pip install flake8 black isort

      - name: 🔍 Run Flake8
        run: |
          cd backend
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🎨 Check code formatting with Black
        run: |
          cd backend
          black --check app/

      - name: 📋 Check imports with isort
        run: |
          cd backend
          isort --check-only app/

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: 🧪 Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_DB: test_data
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-${{ matrix.python-version }}
          fail_ci_if_error: false

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: prometeo-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: /var/www/prometeo
          file: /var/www/prometeo/Dockerfile
          push: false
          tags: prometeo-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Images built successfully
        run: echo "Docker images built and cached!"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Start services with Docker Compose
        run: |
          docker-compose up -d
          sleep 30

      - name: 🧪 Run integration tests
        run: |
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost/ || exit 1
          curl -f http://localhost:8000/api/sensors || exit 1

      - name: 📋 Show logs if failed
        if: failure()
        run: docker-compose logs

      - name: 🛑 Stop services
        if: always()
        run: docker-compose down -v
